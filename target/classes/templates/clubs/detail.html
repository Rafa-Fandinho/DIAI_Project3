<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">>
<head>
    <meta charset="UTF-8">
    <title>Club Detail</title>
</head>
<body>
    <div th:replace="fragments/navbar :: body"></div>

    <h1 th:text="${club.name}"></h1>

    <p><b>Category:</b></p>
    <p th:text="${club.category}"></p>

    <p><b>Description:</b></p>
    <p th:text="${club.description}"></p>

    <br>

    <a th:href="@{/events(clubId=${club.id})}">
        <button>View Events</button>
    </a>

    <a th:href="@{/clubs/{id}/events/new(id=${club.id})}">
        <button>Add Event</button>
</a>
</body>
</html>
