<!-- @thymesVar id="clubs" type="List<pt.unl.fct.iadi.novaevents.controller.dto.ClubResponse>" -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clubs List</title>
</head>
<body>
<div th:replace="fragments/navbar :: body"></div>

<h1>Clubs</h1>

<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Description</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="club : ${clubs}">
        <td th:text="${club.name}"></td>
        <td th:text="${club.category}"></td>
        <td>
            <details>
                <summary>Show</summary>
                <span th:text="${club.description}"></span>
            </details>
        </td>
        <td>
            <a th:href="@{/clubs/{id}(id=${club.id})}">
                <button>View Details</button>
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
