<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Events List</title>
</head>
<body>
<div th:replace="fragments/navbar :: body"></div>

<h1>All Events</h1>

<form method="get" th:action="@{/events}">
    <div>
        <label for="clubId">Club:</label>
        <select id="clubId" name="clubId">
            <option value="">All</option>
            <option th:each="c : ${clubs}"
                    th:value="${c.id}"
                    th:text="${c.name}">
            </option>
        </select>
    </div>

    <div>
        <label for="typeId">Type:</label>
        <select id="typeId" name="typeId">
            <option value="">All</option>
            <option th:each="t : ${types}"
                    th:value="${t.id}"
                    th:text="${t.name}">
            </option>
        </select>
    </div>

    <button type="submit">Filter</button>

    <a th:href="@{/events}">
        <button type="button">Clear</button>
    </a>
</form>

<br>

<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Club</th>
        <th>Date</th>
        <th>Type</th>
        <th>Location</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="event : ${events}">
        <td th:text="${event.name}"></td>
        <td th:text="${event.club.name}"></td>
        <td th:text="${event.date}"></td>
        <td th:text="${event.type.name}"></td>
        <td th:text="${event.location}"></td>

        <td>
            <a th:href="@{/clubs/{clubId}/events/{eventId}/edit(clubId=${event.club.id}, eventId=${event.id})}">
                <button>Edit</button>
            </a>

            <a th:href="@{/clubs/{clubId}/events/{eventId}/delete(clubId=${event.club.id}, eventId=${event.id})}">
                <button>Delete</button>
            </a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
